<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassShield - Password Strength Checker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
        }

        .strength-meter {
            height: 8px;
            background: #334155;
            border-radius: 4px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .strength-text {
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .details {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .details p {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
        }

        .check {
            color: #4ade80;
        }

        .cross {
            color: #f87171;
        }

        .suggestions {
            margin-top: 15px;
            color: #fbbf24;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn:hover {
            background: #0ea5e9;
        }
    </style>
    <!-- zxcvbn library for accurate strength checking -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
</head>

<body>
    <div class="container">
        <h1>PassShield</h1>
        <p class="subtitle">Check if your password is hack-proof</p>

        <input type="password" id="password" placeholder="Type your password..." oninput="checkPassword()">

        <div class="strength-meter">
            <div class="strength-bar" id="strength-bar"></div>
        </div>
        <div class="strength-text" id="strength-text">Enter a password</div>

        <div class="details" id="details" style="display:none;">
            <p>Crack Time: <span id="crack-time">-</span></p>
            <p>Length: <span id="length-check">-</span></p>
            <p>Uppercase: <span id="upper-check">-</span></p>
            <p>Lowercase: <span id="lower-check">-</span></p>
            <p>Number: <span id="number-check">-</span></p>
            <p>Symbol: <span id="symbol-check">-</span></p>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <button class="btn" onclick="generatePassword()">Generate Strong Password</button>
    </div>

    <script>
        function checkPassword() {
            const password = document.getElementById('password').value;
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');
            const details = document.getElementById('details');

            if (password.length === 0) {
                bar.style.width = '0%';
                text.innerText = 'Enter a password';
                text.style.color = '#94a3b8';
                details.style.display = 'none';
                return;
            }

            details.style.display = 'block';

            // 1. Use zxcvbn for scoring
            const result = zxcvbn(password);
            const score = result.score; // 0 to 4

            // 2. Update meter
            const colors = ['#ef4444', '#f97316', '#facc15', '#4ade80', '#22c55e'];
            const labels = ['Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];
            const widths = ['20%', '40%', '60%', '80%', '100%'];

            bar.style.width = widths[score];
            bar.style.background = colors[score];
            text.innerText = labels[score];
            text.style.color = colors[score];

            // 3. Update details
            document.getElementById('crack-time').innerText = result.crack_times_display.offline_slow_hashing_1e4_per_second;
            document.getElementById('length-check').innerHTML = password.length >= 12 ? '<span class="check">✓</span>' : '<span class="cross">✗</span>';
            document.getElementById('upper-check').innerHTML = /[A-Z]/.test(password) ? '<span class="check">✓</span>' : '<span class="cross">✗</span>';
            document.getElementById('lower-check').innerHTML = /[a-z]/.test(password) ? '<span class="check">✓</span>' : '<span class="cross">✗</span>';
            document.getElementById('number-check').innerHTML = /[0-9]/.test(password) ? '<span class="check">✓</span>' : '<span class="cross">✗</span>';
            document.getElementById('symbol-check').innerHTML = /[^A-Za-z0-9]/.test(password) ? '<span class="check">✓</span>' : '<span class="cross">✗</span>';

            // 4. Suggestions
            const suggestionsDiv = document.getElementById('suggestions');
            if (result.feedback.suggestions.length > 0) {
                suggestionsDiv.innerHTML = '<strong>Tips:</strong><br>• ' + result.feedback.suggestions.join('<br>• ');
            } else {
                suggestionsDiv.innerHTML = '<strong>Great!</strong> Your password looks strong.';
            }
        }

        function generatePassword() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+';
            let password = '';
            for (let i = 0; i < 16; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').value = password;
            checkPassword();
        }
    </script>
</body>

</html>
